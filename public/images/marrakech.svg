<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="mar-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c45c1a"/>
      <stop offset="40%" stop-color="#e8943a"/>
      <stop offset="100%" stop-color="#f6d365"/>
    </linearGradient>
    <pattern id="mar-dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.5" fill="#8b4513" opacity="0.15"/>
      <circle cx="16" cy="14" r="1" fill="#654321" opacity="0.12"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#mar-bg)"/>
  <rect width="800" height="600" fill="url(#mar-dots)"/>
  <circle cx="720" cy="100" r="90" fill="#ffd700" opacity="0.2"/>
  <rect x="80" y="480" width="640" height="8" rx="4" fill="#5c3317" opacity="0.3"/>
  <text x="400" y="300" text-anchor="middle" font-family="Palatino, Georgia, serif" font-size="50" font-weight="600" fill="#3d2314">Marrakech</text>
  <text x="400" y="348" text-anchor="middle" font-family="Palatino, Georgia, serif" font-size="17" fill="#5c3d2e">Spice market</text>
</svg>
